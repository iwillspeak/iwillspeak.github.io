{% if post %%}
{% assign content = post.content %}
{% else %}
{% assign post = page %}
{% endif %}

<article class="content">
  <hgroup class="postheader">
    <h1 id="title">{{ post.title }}</h1>
		<p class="info"><time datetime="{{ post.date | date: '%Y-%m-%d' }}">{{ post.date | date_to_string }}</time></p>
  </hgroup>
  {{ content }}
</article>
